version: "3.9"

services:

  api:
    build: .
    container_name: cricket_api
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://cricket_user:cricket123@postgres:5432/cricket_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ── Security ──────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true    # container can't gain extra root permissions
    read_only: false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M            # prevent memory exhaustion attack
    logging:
      driver: "json-file"
      options:
        max-size: "10m"           # prevent log files filling disk
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: cricket_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: cricket_postgres
    environment:
      POSTGRES_USER: cricket_user
      POSTGRES_PASSWORD: cricket123
      POSTGRES_DB: cricket_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ── NOT exposed to internet — internal only ────────────────
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket_user -d cricket_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: cricket_redis
    # ── NOT exposed to internet — internal only ────────────────
    expose:
      - "6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data: