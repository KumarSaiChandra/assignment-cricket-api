version: "3.9"

services:

  # ── FastAPI app ─────────────────────────────────────────────────────
  api:
    build: .
    container_name: cricket_api
    expose:
      - "8000"          # internal only — NOT exposed to internet anymore
    environment:
      - DATABASE_URL=postgresql://cricket_user:cricket123@postgres:5432/cricket_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── NGINX reverse proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cricket_nginx
    ports:
      - "80:80"         # only port exposed to internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cricket_postgres
    environment:
      POSTGRES_USER: cricket_user
      POSTGRES_PASSWORD: cricket123
      POSTGRES_DB: cricket_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket_user -d cricket_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cricket_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: